<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigChange Scheduler</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

.topbar { background: #fff; border-bottom: 1px solid #e5e5e3; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 15px; font-weight: 600; color: #185FA5; }
.topbar-date { font-size: 12px; color: #888; margin-left: 12px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.conn-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #EAF3DE; color: #3B6D11; }
.conn-badge.error { background: #FCEBEB; color: #A32D2D; }
.conn-badge.loading { background: #FAEEDA; color: #854F0B; }
.btn-sm { padding: 6px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.btn-sm:hover { background: #f5f5f3; }

.metrics-bar { display: flex; gap: 12px; padding: 1.25rem 1.5rem; background: #fff; border-bottom: 1px solid #e5e5e3; overflow-x: auto; }
.metric { background: #f5f5f3; border-radius: 8px; padding: 10px 16px; min-width: 130px; flex-shrink: 0; }
.metric .m-label { font-size: 11px; color: #888; margin-bottom: 3px; }
.metric .m-value { font-size: 22px; font-weight: 600; }
.metric .m-value.red { color: #A32D2D; }
.metric .m-value.amber { color: #854F0B; }
.metric .m-value.green { color: #3B6D11; }

.main { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 128px); }
.left-panel { padding: 1.25rem 1.5rem; border-right: 1px solid #e5e5e3; }
.right-panel { padding: 1.25rem; background: #f5f5f3; overflow-y: auto; }

.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-size: 13px; font-weight: 600; }
.section-count { font-size: 12px; color: #888; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }

.jobs-list { display: flex; flex-direction: column; gap: 8px; }
.job-card { background: #fff; border: 1px solid #e5e5e3; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; border-left: 3px solid #e5e5e3; }
.job-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.job-card.selected { border-color: #185FA5; border-left-color: #185FA5; background: #f0f6ff; }
.job-card.breach { border-left-color: #E24B4A; }
.job-card.urgent { border-left-color: #BA7517; }
.job-card.ok { border-left-color: #639922; }
.job-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.job-ref { font-size: 12px; font-weight: 600; color: #185FA5; }
.sla-chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
.sla-chip.breach { background: #FCEBEB; color: #A32D2D; }
.sla-chip.urgent { background: #FAEEDA; color: #854F0B; }
.sla-chip.ok { background: #EAF3DE; color: #3B6D11; }
.job-desc { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.job-client { font-size: 12px; color: #666; margin-bottom: 8px; }
.job-footer { display: flex; align-items: center; gap: 8px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f0f0ee; color: #555; }
.job-area { font-size: 11px; color: #888; margin-left: auto; }

.eng-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.eng-card { background: #fff; border: 1px solid #e5e5e3; border-radius: 10px; padding: 12px; }
.eng-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.eng-name { font-size: 13px; font-weight: 500; }
.eng-sub { font-size: 11px; color: #888; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
.status-dot.available { background: #639922; }
.status-dot.busy { background: #E24B4A; }
.status-dot.travelling { background: #BA7517; }
.bar-wrap { height: 3px; background: #f0f0ee; border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-fill.low { background: #639922; }
.bar-fill.mid { background: #BA7517; }
.bar-fill.high { background: #E24B4A; }
.eng-detail { font-size: 11px; color: #888; }

.assign-panel { background: #fff; border: 1px solid #e5e5e3; border-radius: 10px; overflow: hidden; }
.assign-head { padding: 12px 14px; border-bottom: 1px solid #e5e5e3; background: #f9f9f7; }
.assign-head h3 { font-size: 12px; font-weight: 600; }
.assign-head p { font-size: 11px; color: #888; margin-top: 2px; }
.assign-empty { padding: 2rem 1rem; text-align: center; font-size: 12px; color: #aaa; line-height: 1.7; }
.suggest-list { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.suggest-item { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #e5e5e3; border-radius: 8px; }
.suggest-item.top-pick { border-color: #185FA5; background: #f0f6ff; }
.suggest-rank { font-size: 13px; font-weight: 600; color: #aaa; min-width: 18px; text-align: center; }
.suggest-rank.gold { color: #BA7517; }
.suggest-info { flex: 1; min-width: 0; }
.suggest-name { font-size: 13px; font-weight: 500; }
.suggest-why { font-size: 11px; color: #888; line-height: 1.4; margin-top: 1px; }
.score-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.score-high { background: #EAF3DE; color: #3B6D11; }
.score-mid { background: #FAEEDA; color: #854F0B; }
.btn-assign { padding: 5px 12px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.btn-assign:hover { background: #f0f0ee; }
.btn-assign.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
.btn-assign.primary:hover { background: #0C447C; }

.state-box { padding: 3rem 1rem; text-align: center; color: #aaa; }
.spinner { width: 24px; height: 24px; border: 2px solid #e5e5e3; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { font-size: 13px; color: #A32D2D; line-height: 1.6; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
#toast.show { opacity: 1; }

@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;">
    <span class="logo">BigChange Scheduler</span>
    <span class="topbar-date" id="topbar-date"></span>
  </div>
  <div class="topbar-right">
    <span class="conn-badge loading" id="conn-badge">Connecting...</span>
    <button class="btn-sm" onclick="loadAll()">&#8635; Refresh</button>
  </div>
</div>

<div class="metrics-bar">
  <div class="metric"><div class="m-label">Unassigned jobs</div><div class="m-value red" id="m-unassigned">—</div></div>
  <div class="metric"><div class="m-label">SLA breaching</div><div class="m-value red" id="m-breach">—</div></div>
  <div class="metric"><div class="m-label">Due &lt; 2 hrs</div><div class="m-value amber" id="m-urgent">—</div></div>
  <div class="metric"><div class="m-label">Engineers available</div><div class="m-value green" id="m-avail">—</div></div>
  <div class="metric"><div class="m-label">Assigned today</div><div class="m-value" id="m-done">0</div></div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="section-head">
      <span class="section-title">Unassigned jobs</span>
      <span class="section-count" id="job-count"></span>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('breach',this)">SLA breach</button>
      <button class="filter-btn" onclick="setFilter('urgent',this)">Urgent</button>
      <button class="filter-btn" onclick="setFilter('Reactive',this)">Reactive</button>
      <button class="filter-btn" onclick="setFilter('PPM',this)">PPM</button>
    </div>
    <div class="jobs-list" id="jobs-container">
      <div class="state-box"><div class="spinner"></div><p>Loading jobs...</p></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="section-head" style="margin-bottom:0.75rem;">
      <span class="section-title">Engineers</span>
      <span class="section-count" id="eng-count"></span>
    </div>
    <div id="eng-container">
      <div class="state-box"><div class="spinner"></div></div>
    </div>

    <div class="section-head" style="margin-top:1.25rem;margin-bottom:0.75rem;">
      <span class="section-title">Smart assignment</span>
    </div>
    <div class="assign-panel">
      <div class="assign-head">
        <h3 id="assign-title">No job selected</h3>
        <p id="assign-sub">Click a job to see suggestions</p>
      </div>
      <div id="assign-body">
        <div class="assign-empty">Select a job on the left<br>to see ranked engineer suggestions</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';  // same origin — backend serves this file
let jobs = [], engineers = [], selectedId = null, filter = 'all', assignedToday = 0;
const avatarColors = ['#185FA5','#0F6E56','#534AB7','#993C1D','#854F0B','#3B6D11','#993556','#5F5E5A'];

document.getElementById('topbar-date').textContent =
  new Date().toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

async function api(path, opts={}) {
  const r = await fetch(API + path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error || r.statusText); }
  return r.json();
}

async function loadAll() {
  setBadge('loading','Loading...');
  try {
    await Promise.all([loadJobs(), loadEngineers()]);
    setBadge('ok','Live');
  } catch(e) {
    setBadge('error','Error');
    showToast('Error: ' + e.message);
  }
}

function setBadge(state, text) {
  const b = document.getElementById('conn-badge');
  b.textContent = text;
  b.className = 'conn-badge' + (state==='error'?' error':state==='loading'?' loading':'');
}

async function loadJobs() {
  const data = await api('/api/jobs');
  jobs = data.jobs || [];
  renderJobs();
  updateMetrics();
}

async function loadEngineers() {
  const data = await api('/api/engineers');
  engineers = data.engineers || [];
  renderEngineers();
  updateMetrics();
}

function filtered() {
  if (filter==='all') return jobs;
  if (filter==='breach') return jobs.filter(j=>j.priority==='breach');
  if (filter==='urgent') return jobs.filter(j=>j.priority==='urgent');
  return jobs.filter(j=>(j.type||'').toLowerCase().includes(filter.toLowerCase()));
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderJobs();
}

function slaChip(j) {
  if (!j.sla) return '';
  const hrs = (new Date(j.sla) - Date.now()) / 3600000;
  if (hrs < 0)  return `<span class="sla-chip breach">SLA breached</span>`;
  if (hrs < 2)  return `<span class="sla-chip urgent">${Math.round(hrs*60)}min left</span>`;
  if (hrs < 8)  return `<span class="sla-chip urgent">${Math.round(hrs)}hr left</span>`;
  return `<span class="sla-chip ok">${Math.round(hrs)}hr SLA</span>`;
}

function renderJobs() {
  const list = filtered();
  const c = document.getElementById('jobs-container');
  document.getElementById('job-count').textContent = `${list.length} job${list.length!==1?'s':''}`;
  if (!list.length) { c.innerHTML = `<div class="state-box"><p>No jobs match this filter</p></div>`; return; }
  c.innerHTML = list.map(j=>`
    <div class="job-card ${j.priority}${selectedId===j.id?' selected':''}" onclick="selectJob('${j.id}')">
      <div class="job-top"><span class="job-ref">${j.ref}</span>${slaChip(j)}</div>
      <div class="job-desc">${j.desc}</div>
      <div class="job-client">${j.client}</div>
      <div class="job-footer">
        <span class="tag">${j.type}</span>
        <span class="job-area">${j.area}</span>
      </div>
    </div>`).join('');
}

function renderEngineers() {
  const c = document.getElementById('eng-container');
  document.getElementById('eng-count').textContent = `${engineers.length} engineers`;
  const avail = engineers.filter(e=>e.status==='available').length;
  document.getElementById('m-avail').textContent = avail;
  if (!engineers.length) { c.innerHTML = `<div style="font-size:12px;color:#aaa;padding:1rem 0;">No engineers loaded</div>`; return; }
  const shown = engineers.slice(0, 10);
  c.innerHTML = `<div class="eng-list">${shown.map((e,i)=>{
    const pct = Math.min(100, Math.round((e.jobs/e.cap)*100));
    const fill = pct>=90?'high':pct>=60?'mid':'low';
    const col = avatarColors[i % avatarColors.length];
    const ini = e.name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `<div class="eng-card">
      <div class="eng-top">
        <div class="avatar" style="background:${col}22;color:${col};">${ini}</div>
        <div><div class="eng-name">${e.name}</div><div class="eng-sub">${e.region}</div></div>
        <div class="status-dot ${e.status}" title="${e.status}"></div>
      </div>
      <div class="bar-wrap"><div class="bar-fill ${fill}" style="width:${pct}%"></div></div>
      <div class="eng-detail">${e.jobs}/${e.cap} jobs · ${e.status}</div>
    </div>`;
  }).join('')}
  ${engineers.length>10?`<div style="font-size:11px;color:#aaa;text-align:center;padding:4px;">+${engineers.length-10} more engineers</div>`:''}
  </div>`;
}

function updateMetrics() {
  document.getElementById('m-unassigned').textContent = jobs.length;
  document.getElementById('m-breach').textContent  = jobs.filter(j=>j.priority==='breach').length;
  document.getElementById('m-urgent').textContent  = jobs.filter(j=>j.priority==='urgent').length;
  document.getElementById('m-done').textContent    = assignedToday;
}

function selectJob(id) {
  selectedId = id;
  renderJobs();
  const job = jobs.find(j=>j.id===id);
  if (!job) return;
  document.getElementById('assign-title').textContent = `${job.ref}: ${job.desc}`;
  document.getElementById('assign-sub').textContent   = `${job.client} · ${job.area}`;

  const scored = engineers
    .map((e,i) => {
      let score = 100;
      if (e.status==='travelling') score -= 10;
      if (e.status==='busy')       score -= 25;
      score -= Math.round((e.jobs/e.cap)*30);
      if (job.priority==='breach' && e.status==='available') score += 10;
      return { ...e, score: Math.max(10,Math.min(99,score)), colorIdx: i };
    })
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

  if (!scored.length) {
    document.getElementById('assign-body').innerHTML = `<div class="assign-empty">No engineers available</div>`;
    return;
  }
  document.getElementById('assign-body').innerHTML = `<div class="suggest-list">${scored.map((e,i)=>`
    <div class="suggest-item${i===0?' top-pick':''}">
      <div class="suggest-rank${i===0?' gold':''}">${i===0?'★':i+1}</div>
      <div class="suggest-info">
        <div class="suggest-name">${e.name}</div>
        <div class="suggest-why">${e.region} · ${e.status} · ${e.jobs}/${e.cap} jobs</div>
      </div>
      <span class="score-badge ${e.score>=75?'score-high':'score-mid'}">${e.score}%</span>
      <button class="btn-assign${i===0?' primary':''}" onclick="assignJob('${id}','${e.id}','${e.name.replace(/'/g,"\\'")}')">Assign</button>
    </div>`).join('')}</div>`;
}

async function assignJob(jobId, engId, engName) {
  showToast('Assigning...');
  try {
    await api(`/api/jobs/${jobId}/assign`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({resourceId: engId})
    });
    jobs = jobs.filter(j=>j.id!==jobId);
    assignedToday++;
    selectedId = null;
    updateMetrics();
    renderJobs();
    document.getElementById('assign-title').textContent = 'No job selected';
    document.getElementById('assign-sub').textContent   = 'Click a job to see suggestions';
    document.getElementById('assign-body').innerHTML    = `<div class="assign-empty">Job assigned. Select another job to continue.</div>`;
    showToast(`Assigned to ${engName}`);
    loadEngineers();
  } catch(e) {
    showToast('Failed: ' + e.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 3000);
}

loadAll();
setInterval(loadAll, 60000); // auto-refresh every 60 seconds
</script>
</body>
</html>
