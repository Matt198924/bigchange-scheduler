<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigChange Scheduler</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

/* Top bar */
.topbar { background: #185FA5; padding: 0 1.5rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 15px; font-weight: 600; color: #fff; }
.topbar-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-left: 12px; }
.conn-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.2); color: #fff; }
.conn-badge.error { background: #E24B4A; }
.btn-refresh { padding: 5px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 7px; background: transparent; color: #fff; font-size: 12px; cursor: pointer; }
.btn-refresh:hover { background: rgba(255,255,255,0.1); }

/* Metrics */
.metrics { display: flex; gap: 1px; background: #e5e5e3; border-bottom: 1px solid #e5e5e3; }
.metric { flex: 1; background: #fff; padding: 12px 1rem; text-align: center; }
.metric .m-label { font-size: 11px; color: #888; margin-bottom: 3px; }
.metric .m-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.metric .m-value.blue { color: #185FA5; }
.metric .m-value.green { color: #3B6D11; }
.metric .m-value.red { color: #A32D2D; }

/* Main layout */
.layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 108px); }

/* Left panel - unassigned jobs */
.left { background: #fff; border-right: 1px solid #e5e5e3; display: flex; flex-direction: column; overflow: hidden; }
.panel-head { padding: 10px 14px; border-bottom: 1px solid #e5e5e3; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.panel-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
.panel-count { font-size: 12px; color: #aaa; }
.jobs-scroll { flex: 1; overflow-y: auto; }
.job-item { padding: 10px 14px; border-bottom: 1px solid #f0f0ee; cursor: pointer; transition: background 0.1s; }
.job-item:hover { background: #fafaf9; }
.job-item.selected { background: #EBF4FF; border-left: 3px solid #185FA5; }
.job-ref { font-size: 11px; font-weight: 600; color: #185FA5; margin-bottom: 2px; }
.job-desc { font-size: 12px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-client { font-size: 11px; color: #888; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-tags { display: flex; gap: 5px; align-items: center; }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
.tag-dur { background: #E6F1FB; color: #185FA5; }
.tag-type { background: #f0f0ee; color: #666; }
.tag-cat { background: #EAF3DE; color: #3B6D11; font-size: 10px; }

/* Right panel - timeline */
.right { display: flex; flex-direction: column; overflow: hidden; }
.timeline-controls { padding: 10px 14px; background: #fff; border-bottom: 1px solid #e5e5e3; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.timeline-controls h2 { font-size: 13px; font-weight: 600; }
.selected-job-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #185FA5; color: #fff; }
.hint { font-size: 11px; color: #aaa; margin-left: auto; }

.timeline-scroll { flex: 1; overflow-y: auto; padding: 0; }

/* Engineer timeline rows */
.eng-row { display: grid; grid-template-columns: 160px 1fr; border-bottom: 1px solid #f0f0ee; min-height: 52px; }
.eng-row:hover { background: #fafaf9; }
.eng-label { padding: 8px 10px; border-right: 1px solid #f0f0ee; display: flex; flex-direction: column; justify-content: center; background: #fff; position: sticky; left: 0; z-index: 2; }
.eng-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.eng-meta { font-size: 10px; color: #aaa; margin-top: 1px; }
.trainee-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #BA7517; margin-right: 4px; }

/* The actual timeline track */
.track-wrap { position: relative; background: #f9f9f7; display: flex; align-items: center; padding: 0 8px; }
.track { position: relative; width: 100%; height: 32px; background: #f0f0ee; border-radius: 4px; overflow: visible; }

/* Hour markers */
.hour-markers { display: grid; position: absolute; top: 0; left: 8px; right: 8px; height: 100%; pointer-events: none; }
.hour-mark { border-right: 1px solid #e8e8e6; }

/* Job blocks on timeline */
.job-block { position: absolute; top: 2px; height: 28px; border-radius: 3px; display: flex; align-items: center; padding: 0 5px; overflow: hidden; cursor: default; z-index: 1; }
.job-block.scheduled { background: #B5D4F4; border: 1px solid #378ADD; }
.job-block-label { font-size: 10px; font-weight: 500; color: #0C447C; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Gap blocks - clickable */
.gap-block { position: absolute; top: 2px; height: 28px; border-radius: 3px; cursor: pointer; z-index: 1; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.gap-block.empty { background: rgba(99,153,34,0.12); border: 1px dashed #639922; }
.gap-block.empty:hover { background: rgba(99,153,34,0.25); border-color: #3B6D11; }
.gap-block.fits { background: rgba(24,95,165,0.15); border: 2px solid #185FA5; }
.gap-block.fits:hover { background: rgba(24,95,165,0.28); }
.gap-block.no-fit { background: rgba(99,153,34,0.08); border: 1px dashed #ccc; }
.gap-label { font-size: 9px; color: #3B6D11; font-weight: 500; white-space: nowrap; overflow: hidden; padding: 0 4px; }
.gap-block.fits .gap-label { color: #185FA5; }

/* Hour header */
.hour-header { display: grid; background: #fff; border-bottom: 1px solid #e5e5e3; position: sticky; top: 0; z-index: 10; }
.hour-header-inner { display: grid; grid-template-columns: 160px 1fr; }
.hour-header-label { padding: 4px 10px; font-size: 10px; color: #aaa; border-right: 1px solid #f0f0ee; }
.hour-ticks { display: flex; padding: 0 8px; }
.hour-tick { flex: 1; font-size: 10px; color: #aaa; text-align: left; padding: 4px 0; border-left: 1px solid #f0f0ee; padding-left: 3px; }

/* Gap popup */
.gap-popup { position: fixed; background: #fff; border: 1px solid #e5e5e3; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 16px; width: 320px; z-index: 1000; max-height: 400px; overflow-y: auto; }
.gap-popup h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.gap-popup .sub { font-size: 12px; color: #888; margin-bottom: 12px; }
.gap-popup-close { position: absolute; top: 10px; right: 12px; font-size: 16px; cursor: pointer; color: #aaa; border: none; background: none; }
.fitting-job { padding: 8px 10px; border: 1px solid #e5e5e3; border-radius: 7px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.fitting-job-info { flex: 1; min-width: 0; }
.fitting-job-ref { font-size: 11px; font-weight: 600; color: #185FA5; }
.fitting-job-desc { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fitting-job-sub { font-size: 11px; color: #888; }
.fitting-job-dur { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: #E6F1FB; color: #185FA5; flex-shrink: 0; }
.btn-assign { padding: 4px 10px; border-radius: 6px; border: 1px solid #185FA5; background: #185FA5; color: #fff; font-size: 11px; cursor: pointer; flex-shrink: 0; }
.btn-assign:hover { background: #0C447C; }
.no-fitting { font-size: 12px; color: #aaa; text-align: center; padding: 12px 0; }

.spinner { width: 20px; height: 20px; border: 2px solid #e5e5e3; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 2rem auto; display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { padding: 3rem 1rem; text-align: center; color: #aaa; font-size: 13px; line-height: 1.7; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;">
    <span class="logo">BigChange Scheduler</span>
    <span class="topbar-sub" id="topbar-date"></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="conn-badge" id="conn-badge">Connecting...</span>
    <button class="btn-refresh" onclick="loadAll()">&#8635; Refresh</button>
  </div>
</div>

<div class="metrics">
  <div class="metric"><div class="m-label">Unassigned jobs</div><div class="m-value red" id="m-unassigned">—</div></div>
  <div class="metric"><div class="m-label">Engineers scheduled tomorrow</div><div class="m-value blue" id="m-engs">—</div></div>
  <div class="metric"><div class="m-label">Jobs scheduled tomorrow</div><div class="m-value blue" id="m-tomorrow">—</div></div>
  <div class="metric"><div class="m-label">Gaps available</div><div class="m-value green" id="m-gaps">—</div></div>
  <div class="metric"><div class="m-label">Assigned today</div><div class="m-value" id="m-done">0</div></div>
</div>

<div class="layout">
  <!-- Left: unassigned jobs -->
  <div class="left">
    <div class="panel-head">
      <span class="panel-title">Unassigned jobs</span>
      <span class="panel-count" id="job-count"></span>
    </div>
    <div class="jobs-scroll" id="jobs-list">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Right: timeline -->
  <div class="right">
    <div class="timeline-controls">
      <h2 id="timeline-title">Tomorrow's schedule — Friday 25 April</h2>
      <span class="selected-job-pill" id="selected-pill" style="display:none;"></span>
      <span class="hint" id="timeline-hint">Select a job on the left, then click a gap to assign</span>
    </div>

    <div class="timeline-scroll" id="timeline-scroll">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Gap popup -->
<div class="gap-popup" id="gap-popup" style="display:none;">
  <button class="gap-popup-close" onclick="closePopup()">✕</button>
  <h3 id="popup-title"></h3>
  <div class="sub" id="popup-sub"></div>
  <div id="popup-body"></div>
</div>

<div id="toast"></div>

<script>
const DAY_START = 5;
const DAY_END   = 17;
const DAY_MINS  = (DAY_END - DAY_START) * 60;
const HOURS     = Array.from({length: DAY_END - DAY_START + 1}, (_, i) => DAY_START + i);

let jobs = [], engineers = [], schedule = {}, engNames = {};
let selectedJob = null;
let assignedToday = 0;

const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);

document.getElementById('topbar-date').textContent =
  'Today: ' + new Date().toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'}) +
  '  |  Tomorrow: ' + tomorrow.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});

document.getElementById('timeline-title').textContent =
  "Tomorrow's schedule — " + tomorrow.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});

async function api(path, opts={}) {
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error||r.statusText); }
  return r.json();
}

function setBadge(state, text) {
  const b = document.getElementById('conn-badge');
  b.textContent = text;
  b.className = 'conn-badge' + (state==='error'?' error':'');
}

async function loadAll() {
  setBadge('loading', 'Loading...');
  try {
    await Promise.all([loadJobs(), loadEngineers(), loadSchedule()]);
    setBadge('ok', 'Live');
  } catch(e) {
    setBadge('error', 'Error');
    showToast('Error: ' + e.message);
  }
}

async function loadJobs() {
  const data = await api('/api/jobs/unassigned');
  jobs = data.jobs || [];
  document.getElementById('m-unassigned').textContent = jobs.length;
  document.getElementById('job-count').textContent = jobs.length + ' jobs';
  renderJobList();
}

async function loadEngineers() {
  const data = await api('/api/engineers');
  engineers = data.engineers || [];
}

async function loadSchedule() {
  const data = await api('/api/schedule/tomorrow');
  schedule = data.byEngineer || {};
  engNames = data.engNames || {};
  const totalJobs = Object.values(schedule).reduce((s, arr) => s + arr.length, 0);
  const engCount  = Object.keys(schedule).length;
  document.getElementById('m-engs').textContent    = engCount;
  document.getElementById('m-tomorrow').textContent = totalJobs;
  renderTimeline();
}

// ── JOB LIST ────────────────────────────────────────────

function renderJobList() {
  const c = document.getElementById('jobs-list');
  if (!jobs.length) {
    c.innerHTML = '<div class="empty-state">No unassigned jobs found</div>';
    return;
  }
  c.innerHTML = jobs.map(j => `
    <div class="job-item${selectedJob && selectedJob.id===j.id?' selected':''}" onclick="selectJob('${j.id}')">
      <div class="job-ref">${j.ref}</div>
      <div class="job-desc">${j.desc}</div>
      <div class="job-client">${j.client}</div>
      <div class="job-tags">
        <span class="tag tag-dur">${j.durationMins} min</span>
        <span class="tag tag-type">${j.type}</span>
      </div>
    </div>`).join('');
}

function selectJob(id) {
  selectedJob = jobs.find(j => j.id === id) || null;
  renderJobList();
  const pill = document.getElementById('selected-pill');
  const hint = document.getElementById('timeline-hint');
  if (selectedJob) {
    pill.textContent = selectedJob.ref + ' — ' + selectedJob.durationMins + ' min';
    pill.style.display = 'inline-block';
    hint.textContent = 'Click a green gap to assign this job';
  } else {
    pill.style.display = 'none';
    hint.textContent = 'Select a job on the left, then click a gap to assign';
  }
  renderTimeline();
}

// ── TIMELINE ────────────────────────────────────────────

function timeToMins(t) {
  if (!t) return -1;
  try {
    const d = new Date(t);
    if (!isNaN(d)) return d.getHours() * 60 + d.getMinutes();
    const p = t.split(':');
    return parseInt(p[0]) * 60 + parseInt(p[1] || 0);
  } catch(e) { return -1; }
}

function pct(mins) {
  return ((mins - DAY_START * 60) / DAY_MINS * 100).toFixed(3) + '%';
}

function widthPct(startMins, endMins) {
  return ((endMins - startMins) / DAY_MINS * 100).toFixed(3) + '%';
}

function minsToLabel(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const suffix = h >= 12 ? 'pm' : 'am';
  const h12 = h > 12 ? h - 12 : h;
  return m === 0 ? `${h12}${suffix}` : `${h12}:${String(m).padStart(2,'0')}${suffix}`;
}

function getGaps(engId) {
  const engJobs = (schedule[engId] || [])
    .map(j => ({ start: timeToMins(j.startTime), end: timeToMins(j.endTime), label: j.client || j.desc }))
    .filter(j => j.start >= 0 && j.end > j.start)
    .sort((a, b) => a.start - b.start);

  const gaps = [];
  let cursor = DAY_START * 60;

  for (const slot of engJobs) {
    if (slot.start > cursor + 10) {
      gaps.push({ startMins: cursor, endMins: slot.start, gapMins: slot.start - cursor });
    }
    cursor = Math.max(cursor, slot.end);
  }
  if (DAY_END * 60 > cursor + 10) {
    gaps.push({ startMins: cursor, endMins: DAY_END * 60, gapMins: DAY_END * 60 - cursor });
  }
  return gaps;
}

function renderTimeline() {
  const container = document.getElementById('timeline-scroll');

  // Only engineers with at least 1 job tomorrow
  const engIds = Object.keys(schedule)
    .filter(id => (schedule[id] || []).length > 0)
    .sort((a, b) => {
      const nameA = (engineers.find(e => e.id === a) || {}).name || '';
      const nameB = (engineers.find(e => e.id === b) || {}).name || '';
      return nameA.localeCompare(nameB);
    });
  if (!engIds.length) {
    container.innerHTML = '<div class="empty-state">No engineers scheduled for tomorrow yet</div>';
    document.getElementById('m-gaps').textContent = '—';
    return;
  }

  // Build hour ticks header
  const ticksHtml = HOURS.map(h => {
    const label = h === 12 ? '12pm' : h < 12 ? h + 'am' : (h - 12) + 'pm';
    return `<div class="hour-tick">${label}</div>`;
  }).join('');

  // Count total gaps that fit the selected job
  let totalGaps = 0;

  const rowsHtml = engIds.map(engId => {
    const eng = engineers.find(e => e.id === engId) || { name: engNames[engId] || ('Engineer ' + engId), isTrainee: false };
    const engJobs = schedule[engId] || [];
    const gaps = getGaps(engId);

    totalGaps += gaps.length;

    // Job blocks
    const jobBlocks = engJobs.map(j => {
      const s = timeToMins(j.startTime);
      const e = timeToMins(j.endTime);
      if (s < 0 || e <= s) return '';
      const clampedS = Math.max(s, DAY_START * 60);
      const clampedE = Math.min(e, DAY_END * 60);
      if (clampedE <= clampedS) return '';
      return `<div class="job-block scheduled" style="left:${pct(clampedS)};width:${widthPct(clampedS, clampedE)};" title="${j.client} (${j.durationMins}min)">
        <span class="job-block-label">${j.client || j.desc}</span>
      </div>`;
    }).join('');

    // Gap blocks
    const gapBlocks = gaps.map(g => {
      const fits = selectedJob && g.gapMins >= selectedJob.durationMins;
      const noJob = !selectedJob;
      const cls = noJob ? 'empty' : fits ? 'fits' : 'no-fit';
      const label = noJob
        ? (g.gapMins >= 30 ? minsToLabel(g.startMins) + '–' + minsToLabel(g.endMins) : '')
        : fits ? `✓ ${g.gapMins}min free` : '';
      return `<div class="gap-block ${cls}" 
        style="left:${pct(g.startMins)};width:${widthPct(g.startMins, g.endMins)};"
        title="${minsToLabel(g.startMins)}–${minsToLabel(g.endMins)} (${g.gapMins} min free)"
        onclick="clickGap('${engId}','${eng.name}',${g.startMins},${g.endMins},${g.gapMins},event)">
        <span class="gap-label">${label}</span>
      </div>`;
    }).join('');

    const jobCount = engJobs.length;
    const gapCount = gaps.length;

    return `
      <div class="eng-row">
        <div class="eng-label">
          <div class="eng-name">${eng.isTrainee ? '<span class="trainee-dot"></span>' : ''}${eng.name}</div>
          <div class="eng-meta">${jobCount} job${jobCount!==1?'s':''} · ${gapCount} gap${gapCount!==1?'s':''}</div>
        </div>
        <div class="track-wrap">
          <div class="track">
            ${jobBlocks}
            ${gapBlocks}
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('m-gaps').textContent = totalGaps;

  container.innerHTML = `
    <div class="hour-header">
      <div class="hour-header-inner">
        <div class="hour-header-label">Engineer</div>
        <div class="hour-ticks">${ticksHtml}</div>
      </div>
    </div>
    ${rowsHtml}`;
}

// ── GAP CLICK ────────────────────────────────────────────

function clickGap(engId, engName, startMins, endMins, gapMins, event) {
  event.stopPropagation();

  const fittingJobs = jobs.filter(j => j.durationMins <= gapMins);

  const popup = document.getElementById('gap-popup');
  document.getElementById('popup-title').textContent =
    engName + ' — ' + minsToLabel(startMins) + ' to ' + minsToLabel(endMins);
  document.getElementById('popup-sub').textContent =
    gapMins + ' minute gap · ' + (fittingJobs.length ? fittingJobs.length + ' job' + (fittingJobs.length!==1?'s':'') + ' will fit' : 'No unassigned jobs fit this gap');

  if (!fittingJobs.length) {
    document.getElementById('popup-body').innerHTML =
      `<div class="no-fitting">No unassigned jobs are short enough to fit in this ${gapMins} minute gap</div>`;
  } else {
    document.getElementById('popup-body').innerHTML = fittingJobs.slice(0, 10).map(j => `
      <div class="fitting-job">
        <div class="fitting-job-info">
          <div class="fitting-job-ref">${j.ref}</div>
          <div class="fitting-job-desc">${j.desc}</div>
          <div class="fitting-job-sub">${j.client}</div>
        </div>
        <span class="fitting-job-dur">${j.durationMins}min</span>
        <button class="btn-assign" onclick="assignJob('${j.id}','${engId}',${startMins},'${j.ref}','${engName.replace(/'/g,"\\'")}')">Assign</button>
      </div>`).join('');
  }

  // Position popup near click
  const x = Math.min(event.clientX, window.innerWidth - 340);
  const y = Math.min(event.clientY + 10, window.innerHeight - 420);
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.style.display = 'block';
}

function closePopup() {
  document.getElementById('gap-popup').style.display = 'none';
}

document.addEventListener('click', e => {
  const popup = document.getElementById('gap-popup');
  if (popup.style.display !== 'none' && !popup.contains(e.target)) {
    closePopup();
  }
});

// ── ASSIGN ───────────────────────────────────────────────

async function assignJob(jobId, engId, startMins, jobRef, engName) {
  const d = new Date(tomorrow);
  d.setHours(Math.floor(startMins / 60), startMins % 60, 0, 0);
  const plannedStart = d.toISOString();

  closePopup();
  showToast('Assigning ' + jobRef + '...');

  try {
    await api(`/api/jobs/${jobId}/assign`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({resourceId: engId, plannedStart})
    });

    jobs = jobs.filter(j => j.id !== jobId);
    assignedToday++;
    selectedJob = null;

    document.getElementById('m-unassigned').textContent = jobs.length;
    document.getElementById('job-count').textContent = jobs.length + ' jobs';
    document.getElementById('m-done').textContent = assignedToday;
    document.getElementById('selected-pill').style.display = 'none';
    document.getElementById('timeline-hint').textContent = 'Select a job on the left, then click a gap to assign';

    renderJobList();
    showToast(jobRef + ' assigned to ' + engName);
    loadSchedule();
  } catch(e) {
    showToast('Failed: ' + e.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 3500);
}

loadAll();
setInterval(loadAll, 120000);
</script>
</body>
