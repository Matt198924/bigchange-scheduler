<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigChange Scheduler</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --navy: #1a2744;
  --navy-mid: #233159;
  --navy-light: #2d3f72;
  --accent: #4a9eff;
  --accent-dim: rgba(74,158,255,0.15);
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #e8edf5;
  --text-dim: #8899bb;
  --border: rgba(255,255,255,0.08);
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.07);
  --glow: 0 0 20px rgba(74,158,255,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--navy);
  color: var(--text);
  font-size: 13px;
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at 20% 0%, rgba(74,158,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(74,158,255,0.05) 0%, transparent 50%);
}

/* ── Topbar ── */
.topbar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  box-shadow: 0 1px 20px rgba(0,0,0,0.3);
}
.topbar-divider { width: 1px; height: 28px; background: var(--border); }
.topbar-sub { font-size: 12px; color: var(--text-dim); font-weight: 300; letter-spacing: 0.02em; }
.conn-badge {
  font-size: 11px; padding: 4px 12px; border-radius: 20px;
  background: rgba(34,197,94,0.15); color: var(--success);
  border: 1px solid rgba(34,197,94,0.3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.conn-badge.error { background: rgba(239,68,68,0.15); color: var(--danger); border-color: rgba(239,68,68,0.3); }
.btn-refresh {
  padding: 6px 14px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--card);
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all 0.2s;
}
.btn-refresh:hover { background: var(--card-hover); color: var(--text); border-color: var(--accent); }

/* ── Metrics ── */
.metrics {
  display: flex;
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.metric {
  flex: 1; min-width: 110px;
  padding: 12px 16px;
  text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
  transition: background 0.2s;
}
.metric:hover { background: var(--card); }
.metric .m-label {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 4px; font-weight: 500;
}
.metric .m-value { font-size: 22px; font-weight: 600; color: var(--text); }
.metric .m-value.red { color: var(--danger); }
.metric .m-value.amber { color: var(--warning); }
.metric .m-value.green { color: var(--success); }
.metric .m-value.blue { color: var(--accent); }

/* ── Tabs ── */
.tabs {
  display: flex;
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 1rem;
}
.tab {
  padding: 11px 18px; font-size: 12px;
  border: none; background: none; cursor: pointer;
  color: var(--text-dim); border-bottom: 2px solid transparent;
  margin-bottom: -1px; font-family: 'Outfit', sans-serif;
  font-weight: 500; letter-spacing: 0.02em;
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.06em;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 148px);
}

/* ── Left panel ── */
.left {
  background: var(--navy-mid);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-head {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title {
  font-size: 10px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.panel-count { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

.jobs-scroll { flex: 1; overflow-y: auto; }
.jobs-scroll::-webkit-scrollbar { width: 4px; }
.jobs-scroll::-webkit-scrollbar-track { background: transparent; }
.jobs-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.job-item {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; border-left: 2px solid transparent;
  transition: all 0.15s;
}
.job-item:hover { background: var(--card-hover); }
.job-item.selected { background: var(--accent-dim); border-left-color: var(--accent); }
.job-ref { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 2px; font-family: 'JetBrains Mono', monospace; }
.job-desc { font-size: 12px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.job-client { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-tags { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.tag-dur { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(74,158,255,0.15); color: var(--accent); border: 1px solid rgba(74,158,255,0.25); }
.tag-type { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--card); color: var(--text-dim); border: 1px solid var(--border); }

/* ── Right panel / Timeline ── */
.right { display: flex; flex-direction: column; overflow: hidden; background: var(--navy); }
.timeline-controls {
  padding: 8px 14px; background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; min-height: 40px;
}
.selected-pill {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(74,158,255,0.3);
  font-family: 'JetBrains Mono', monospace;
}
.hint { font-size: 11px; color: var(--text-dim); margin-left: auto; }

.timeline-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.timeline-scroll::-webkit-scrollbar { width: 4px; }
.timeline-scroll::-webkit-scrollbar-track { background: transparent; }
.timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Hour header */
.hour-header {
  display: grid; grid-template-columns: 160px 1fr;
  background: var(--navy-mid); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.hour-header-label { padding: 5px 10px; font-size: 10px; color: var(--text-dim); border-right: 1px solid var(--border); }
.hour-ticks { display: flex; }
.hour-tick { flex: 1; font-size: 9px; color: var(--text-dim); padding: 5px 0 5px 4px; border-left: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }

/* Engineer rows */
.eng-row { display: grid; grid-template-columns: 160px 1fr; border-bottom: 1px solid var(--border); min-height: 50px; }
.eng-row:hover { background: rgba(255,255,255,0.02); }
.eng-label { padding: 8px 10px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; }
.eng-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.eng-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

.track-wrap { position: relative; background: rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 8px; }
.track { position: relative; width: 100%; height: 32px; background: rgba(255,255,255,0.04); border-radius: 4px; border: 1px solid var(--border); }

/* Job blocks */
.job-block { position: absolute; top: 2px; height: 28px; border-radius: 3px; display: flex; align-items: center; padding: 0 5px; overflow: hidden; z-index: 2; }
.job-block-label { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Gap blocks */
.gap-block { position: absolute; top: 2px; height: 28px; border-radius: 3px; z-index: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
.gap-block:hover { opacity: 0.85; transform: scaleY(1.05); }
.gap-empty { background: rgba(34,197,94,0.1); border: 1px dashed rgba(34,197,94,0.35); }
.gap-fits { background: rgba(74,158,255,0.2); border: 2px solid rgba(74,158,255,0.6); box-shadow: 0 0 8px rgba(74,158,255,0.2); }
.gap-nofit { background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1); }
.gap-label { font-size: 9px; font-weight: 500; white-space: nowrap; overflow: hidden; padding: 0 4px; color: var(--success); }
.gap-fits .gap-label { color: var(--accent); }

.now-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--danger); z-index: 5; pointer-events: none; box-shadow: 0 0 6px rgba(239,68,68,0.5); }

/* Gap popup */
.gap-popup {
  position: fixed; background: var(--navy-mid);
  border: 1px solid var(--border); border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), var(--glow);
  padding: 16px; width: 360px; z-index: 1000;
  max-height: 440px; overflow-y: auto;
  backdrop-filter: blur(20px);
}
.gap-popup h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.gap-popup-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
.gap-popup-close { position: absolute; top: 12px; right: 14px; font-size: 16px; cursor: pointer; color: var(--text-dim); border: none; background: none; line-height: 1; transition: color 0.2s; }
.gap-popup-close:hover { color: var(--text); }

.fitting-job {
  padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
  background: var(--card); transition: all 0.15s;
}
.fitting-job:hover { background: var(--card-hover); border-color: rgba(74,158,255,0.3); }
.fitting-job.selected-job { border-color: var(--accent); background: var(--accent-dim); }
.fitting-job-info { flex: 1; min-width: 0; }
.fitting-job-ref { font-size: 11px; font-weight: 600; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.fitting-job-desc { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.fitting-job-sub { font-size: 11px; color: var(--text-dim); }
.fitting-job-dur { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(74,158,255,0.25); flex-shrink: 0; }
.btn-assign {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--accent);
  background: var(--accent-dim); color: var(--accent);
  font-size: 11px; cursor: pointer; flex-shrink: 0;
  font-family: 'Outfit', sans-serif; font-weight: 500;
  transition: all 0.2s;
}
.btn-assign:hover { background: var(--accent); color: #fff; }
.no-fitting { font-size: 12px; color: var(--text-dim); text-align: center; padding: 16px 0; }
.constraint-info { font-size: 11px; color: var(--warning); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); padding: 5px 10px; border-radius: 6px; margin-bottom: 8px; }

/* Same site view */
#samesite-view { background: var(--navy); }

/* Spinner */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 2rem auto; display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-msg { padding: 3rem 1rem; text-align: center; color: var(--text-dim); font-size: 13px; }

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--navy-mid); color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 8px; font-size: 13px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#toast.show { opacity: 1; }
</style>
</head>

<script>
const DAY_START = 5;
const DAY_END = 17;
const DAY_MINS = (DAY_END - DAY_START) * 60;
const HOURS = Array.from({length: DAY_END - DAY_START + 1}, (_, i) => DAY_START + i);

let jobs = [], engineers = [], schedule = {}, engNames = {}, todaySchedule = {}, todayEngNames = {};
const constraintsCache = {}; // cache constraints per job id to avoid repeated fetches
let selectedJob = null, selectedConstraints = [], currentTab = 'today', assignedToday = 0;
let jobConstraints = {}; // cache of constraints per job id

// Set up dates
const todayDate = new Date();
const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
document.getElementById('topbar-date').textContent =
  'Today: ' + todayDate.toLocaleDateString('en-GB', {weekday:'short',day:'numeric',month:'short'}) +
  '  |  Tomorrow: ' + tomorrowDate.toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long'});

// ── API ──────────────────────────────────────────────────
async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error||r.statusText); }
  return r.json();
}

function setBadge(state, text) {
  const b = document.getElementById('conn-badge');
  b.textContent = text;
  b.className = 'conn-badge' + (state==='error'?' error':'');
}

async function loadAll() {
  setBadge('loading','Loading...');
  // Load critical data first - jobs, today schedule, engineers
  const results = await Promise.allSettled([
    loadJobs(),
    loadEngineers(),
    loadSchedule('today'),
  ]);
  renderAll();
  setBadge('ok','Live');
  // Load tomorrow in background - not needed for initial view
  loadSchedule('tomorrow').then(() => {
    if (currentTab === 'tomorrow') renderTimeline();
  }).catch(e => console.error('Tomorrow schedule failed:', e));
}

async function loadJobs() {
  const data = await api('/api/jobs/unassigned');
  jobs = data.jobs || [];
  document.getElementById('m-unassigned').textContent = jobs.length;
  document.getElementById('job-count').textContent = jobs.length + ' jobs';
  renderJobList();
  // Flags fetched on demand only - not in background
}

const jobFlags = {}; // cache flags per job id

async function fetchAllFlags() {
  for (let i = 0; i < jobs.length; i += 3) {
    const batch = jobs.slice(i, i + 3);
    await Promise.all(batch.map(async j => {
      if (jobFlags[j.id] !== undefined) return;
      try {
        const data = await api('/api/jobs/' + j.id + '/flags');
        jobFlags[j.id] = data.flags || [];
      } catch(e) {
        jobFlags[j.id] = [];
      }
    }));
    if (i === 0) renderJobList(); // re-render after first batch
    await new Promise(r => setTimeout(r, 300));
  }
  renderJobList(); // final re-render
}

async function loadEngineers() {
  const data = await api('/api/engineers');
  engineers = data.engineers || [];
}

async function loadSchedule(day) {
  const endpoint = day === 'today' ? '/api/schedule/today' : '/api/schedule/tomorrow';
  const data = await api(endpoint);
  if (day === 'today') {
    todaySchedule = data.byEngineer || {};
    todayEngNames = data.engNames || {};
    document.getElementById('m-today-engs').textContent = Object.keys(todaySchedule).length;
    // Calculate today's job stats

async function fetchConstraints(jobId) {
  try {
    const data = await api('/api/jobs/' + jobId + '/constraints');
    return data.constraints || [];
  } catch(e) { return []; }
}

function describeConstraint(c) {
  const at = c.constraintAt ? fmtTime(c.constraintAt) : '';
  if (c.type === 'jobMustStartAfter')    return 'Start after ' + at;
  if (c.type === 'jobMustStartBefore')   return 'Start before ' + at;
  if (c.type === 'jobMustCompleteBefore') return 'Complete before ' + at;
  if (c.type === 'jobResource')          return 'Specific engineer required';
  if (c.type === 'jobRequiresResourceSkill') return 'Skill required';
  return '';
}

function constraintPasses(gapStart, gapEnd, durMins, constraints) {
  for (const c of constraints) {
    if (!c.constraintAt) continue;
    const mins = timeToMins(c.constraintAt);
    if (mins < 0) continue;
    if (c.type === 'jobMustStartAfter'    && gapStart < mins)            return false;
    if (c.type === 'jobMustStartBefore'   && gapStart >= mins)           return false;
    if (c.type === 'jobMustCompleteBefore' && gapStart + durMins > mins) return false;
  }
  return true;
}

// Store gap data separately so click handler can look it up
const gapStore = {};

function calcGaps(engId, sched, fromMins) {
  const isToday = fromMins > DAY_START * 60;

  const engJobs = (sched[engId]||[])
    .map(j => ({
      start: timeToMins(j.startTime),
      end: timeToMins(j.endTime),
      lat: j.lat, lng: j.lng, client: j.client,
      status: j.status, actualStart: j.actualStart,
      statusModifiedAt: j.statusModifiedAt,
    }))
    .filter(j => j.start >= 0 && j.end > j.start)
    .sort((a,b) => a.start - b.start);

  // Effective start: for today use current time, for tomorrow always use 5am
  const effectiveStart = isToday ? fromMins : DAY_START * 60;
  const cursor0 = Math.max(effectiveStart, DAY_START * 60);

  const gaps = [];
  let cursor = cursor0;
  let prevJob = engJobs.filter(j => j.end <= effectiveStart).pop() || null;

  for (const slot of engJobs) {
    if (slot.end <= effectiveStart) continue;
    if (slot.start > cursor + 10) {
      const travel = prevJob ? estTravelMins(prevJob.lat, prevJob.lng, slot.lat, slot.lng) : 0;
      const usableStart = Math.min(cursor + travel, slot.start - 15);
      const usableMins = slot.start - usableStart;
      if (usableMins >= 20) {
        gaps.push({ startMins: usableStart, endMins: slot.start, gapMins: usableMins, travelMins: travel });
      }
    }
    cursor = Math.max(cursor, slot.end);
    prevJob = slot;
  }
  if (DAY_END * 60 > cursor + 20) {
    gaps.push({ startMins: cursor, endMins: DAY_END * 60, gapMins: DAY_END * 60 - cursor, travelMins: 0 });
  }

  gapStore[engId + '_today'] = gaps;
  gapStore[engId + '_tomorrow'] = gaps;
  return gaps;
}

function estTravelMins(lat1, lng1, lat2, lng2) {
  if (!lat1||!lng1||!lat2||!lng2) return 30;
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const km = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(km / 64 * 60) + 10;
}

async function showGapPopup(engId, engName, g, day, e) {
  // Show popup immediately with loading state
  document.getElementById('popup-title').textContent = escHtml(engName) + ' — ' + fmtMins(g.startMins) + ' to ' + fmtMins(g.endMins);
  document.getElementById('popup-sub').textContent = 'Checking...';
  document.getElementById('popup-constraints').innerHTML = '';
  document.getElementById('popup-body').innerHTML = '';

  const x = Math.min(e.clientX + 10, window.innerWidth - 360);
  const y = Math.min(e.clientY + 10, window.innerHeight - 440);
  const popup = document.getElementById('gap-popup');
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.style.display = 'block';

  // Get surrounding job locations for proximity check
  const sched = day === 'today' ? todaySchedule : schedule;
  const engJobs = (sched[engId] || [])
    .map(j => ({ start: timeToMins(j.startTime), end: timeToMins(j.endTime), lat: j.lat, lng: j.lng }))
    .filter(j => j.start >= 0)
    .sort((a,b) => a.start - b.start);

  const prevJob = engJobs.filter(j => j.end <= g.startMins).pop() || null;
  const nextJob = engJobs.find(j => j.start >= g.endMins) || null;
  const MAX_TRAVEL = 45;

  // First filter by duration and proximity
  const candidateJobs = jobs.filter(j => {
    if (j.durationMins > g.gapMins) return false;
    if (!j.lat || !j.lng) return true;
    const travelFromPrev = prevJob && prevJob.lat ? estTravelMins(prevJob.lat, prevJob.lng, j.lat, j.lng) : null;
    const travelToNext   = nextJob && nextJob.lat ? estTravelMins(j.lat, j.lng, nextJob.lat, nextJob.lng) : null;
    if (travelFromPrev !== null && travelToNext !== null) return travelFromPrev <= MAX_TRAVEL && travelToNext <= MAX_TRAVEL;
    if (travelFromPrev !== null) return travelFromPrev <= MAX_TRAVEL;
    if (travelToNext   !== null) return travelToNext   <= MAX_TRAVEL;
    return true;
  });

  // Sort candidates - selected job first
  const sorted = [...candidateJobs].sort((a,b) => {
    if (selectedJob && a.id===selectedJob.id) return -1;
    if (selectedJob && b.id===selectedJob.id) return 1;
    return b.durationMins - a.durationMins;
  });

  // Fetch constraints on demand for top candidates only (fast - only 10 calls)
  const top = sorted.slice(0, 10);
  const constraintCache = {};
  await Promise.all(top.map(async j => {
    if (constraintsCache[j.id] !== undefined) {
      constraintCache[j.id] = constraintsCache[j.id];
      return;
    }
    try {
      const data = await api('/api/jobs/' + j.id + '/constraints');
      constraintsCache[j.id] = data.constraints || [];
      constraintCache[j.id] = constraintsCache[j.id];
    } catch(e) {
      constraintsCache[j.id] = [];
      constraintCache[j.id] = [];
    }
  }));

  // Filter by constraints
  const fittingJobs = top.filter(j => {
    const constraints = constraintCache[j.id] || [];
    return constraintPasses(g.startMins, g.endMins, j.durationMins, constraints);
  });

  // Update popup with results
  document.getElementById('popup-sub').textContent = g.gapMins + ' min usable'
    + (g.travelMins > 0 ? ' (incl. ~' + g.travelMins + 'min travel)' : '')
    + ' · ' + fittingJobs.length + ' job' + (fittingJobs.length!==1?'s':'') + ' fit';

  if (!fittingJobs.length) {
    document.getElementById('popup-body').innerHTML = '<div class="no-fitting">No unassigned jobs fit this ' + g.gapMins + ' min gap</div>';
  } else {
    document.getElementById('popup-body').innerHTML = fittingJobs.map(j => {
      const travelFrom = prevJob && prevJob.lat && j.lat ? estTravelMins(prevJob.lat, prevJob.lng, j.lat, j.lng) : null;
      const travelTo   = nextJob && nextJob.lat && j.lat ? estTravelMins(j.lat, j.lng, nextJob.lat, nextJob.lng) : null;
      const travelInfo = travelFrom !== null ? '~' + travelFrom + 'min from prev' + (travelTo !== null ? ', ~' + travelTo + 'min to next' : '') : '';
      const constraints = constraintCache[j.id] || [];
      const cLabels = constraints.map(describeConstraint).filter(Boolean);
      return '<div class="fitting-job' + (selectedJob&&j.id===selectedJob.id?' selected-job':'') + '">'
        + '<div class="fitting-job-info">'
        + '<div class="fitting-job-ref">' + escHtml(j.ref) + '</div>'
        + '<div class="fitting-job-desc">' + escHtml(j.desc) + '</div>'
        + '<div class="fitting-job-sub">' + escHtml(j.client)
          + (travelInfo ? ' · <span style="color:#854F0B;">&#128664; ' + travelInfo + '</span>' : '')
          + (cLabels.length ? ' · <span style="color:#854F0B;">⚠ ' + cLabels.join(', ') + '</span>' : '')
          + '</div>'
        + '</div>'
        + '<span class="fitting-job-dur">' + j.durationMins + 'min</span>'
        + '<button class="btn-assign" data-jobid="' + j.id + '" data-jobref="' + escHtml(j.ref) + '" data-engid="' + engId + '" data-engname="' + escHtml(engName) + '" data-start="' + g.startMins + '" data-day="' + day + '">Assign</button>'
        + '</div>';
    }).join('');
  }
}

document.addEventListener('click', function(e) {
  const btn = e.target.closest('.btn-assign');
  if (!btn) return;
  e.stopPropagation();

function closePopup() {
  document.getElementById('gap-popup').style.display = 'none';
}

async function assignJob(jobId, jobRef, engId, engName, startMins, day) {
  const d = day === 'today' ? new Date(todayDate) : new Date(tomorrowDate);
  d.setHours(Math.floor(startMins/60), startMins%60, 0, 0);
  // If time is in the past, push to 15 mins from now
  if (d < new Date()) {
    const now = new Date();
    now.setMinutes(now.getMinutes() + 15, 0, 0);
    d.setTime(now.getTime());
  }
  closePopup();
  showToast('Assigning ' + jobRef + '...');
  try {
    await api('/api/jobs/' + jobId + '/assign', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({resourceId: engId, plannedStart: d.toISOString()})
    });
    jobs = jobs.filter(j => j.id !== jobId);
    if (selectedJob && selectedJob.id === jobId) { selectedJob = null; selectedConstraints = []; }
    assignedToday++;
    document.getElementById('m-unassigned').textContent = jobs.length;
    document.getElementById('job-count').textContent = jobs.length + ' jobs';
    document.getElementById('m-done').textContent = assignedToday;
    document.getElementById('selected-pill').style.display = 'none';
    document.getElementById('timeline-hint').textContent = 'Select a job then click a gap';
    showToast(jobRef + ' assigned to ' + engName);
    renderJobList();
    await loadSchedule(day);
    renderTimeline();
  } catch(err) {
    showToast('Failed: ' + err.message);
  }
}

// ── HELPERS ──────────────────────────────────────────────
function timeToMins(t) {
  if (!t) return -1;
  try {
    const d = new Date(t);
    if (!isNaN(d)) return d.getHours()*60 + d.getMinutes();
    const p = t.split(':');
    return parseInt(p[0])*60 + parseInt(p[1]||0);
  } catch(e) { return -1; }
}

function pct(mins) {
  return ((mins - DAY_START*60) / DAY_MINS * 100).toFixed(3) + '%';
}

function wpct(s, e) {
  return ((e-s) / DAY_MINS * 100).toFixed(3) + '%';
}

function fmtMins(mins) {
  const h = Math.floor(mins/60), m = mins%60;
  const suffix = h>=12?'pm':'am', h12 = h>12?h-12:h===0?12:h;
  return h12 + (m?':'+String(m).padStart(2,'0'):'') + suffix;
}

function fmtTime(dt) {
  try { return new Date(dt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return dt; }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


function renderSameSite() {
  const container = document.getElementById('samesite-content');
  container.innerHTML = '<div class="spinner" style="margin:3rem auto;"></div>';

  // Build lookup of scheduled jobs by contact name (today + tomorrow)
  const scheduledByContact = {};

  const SHOW_STATUSES = ['new','scheduled','sent','read','accepted','refused','ontheway','started','suspended'];

  const addJobs = (sched, names, dayLabel) => {
    Object.entries(sched).forEach(([engId, engJobs]) => {
      const engName = names[engId] || ('Engineer ' + engId);
      engJobs.forEach(j => {
        const contact = (j.client || '').trim().toLowerCase();
        if (!contact || contact === '—') return;
        // Only include active jobs - not completed or cancelled
        const st = (j.status || '').toLowerCase();
        if (!SHOW_STATUSES.includes(st)) return;
        if (!scheduledByContact[contact]) scheduledByContact[contact] = [];
        scheduledByContact[contact].push({ ...j, engName, engId, dayLabel });
      });
    });
  };

  addJobs(todaySchedule, todayEngNames, 'Today');
  addJobs(schedule, engNames, 'Tomorrow');

  // Find unassigned jobs that share a contact with a scheduled job
  const matches = [];
  jobs.forEach(u => {
    const contact = (u.client || '').trim().toLowerCase();
    if (!contact || contact === '—') return;
    const scheduled = scheduledByContact[contact];
    if (scheduled && scheduled.length > 0) {
      matches.push({ unassigned: u, scheduled });
    }
  });

  if (!matches.length) {
    container.innerHTML = '<div class="empty-msg" style="padding:3rem;text-align:center;color:#aaa;font-size:13px;">No same-site opportunities found</div>';
    return;
  }

  container.innerHTML =
    '<div style="font-size:13px;color:#888;margin-bottom:1rem;">'
    + matches.length + ' unassigned job' + (matches.length !== 1 ? 's' : '')
    + ' at a site that already has work scheduled</div>'
    + matches.map(m => {
      const u = m.unassigned;
      return '<div style="background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:16px;margin-bottom:12px;">'

        // Header - site name
        + '<div style="font-size:12px;font-weight:600;color:#185FA5;margin-bottom:10px;">&#128205; ' + escHtml(u.client) + '</div>'

        + '<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start;">'

        // Unassigned job - with assign buttons for each engineer already at site
        + '<div style="background:#FFF8F0;border:1px solid #FAEEDA;border-radius:8px;padding:12px;">'
        + '<div style="font-size:10px;font-weight:600;color:#854F0B;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Unassigned</div>'
        + '<div style="font-size:12px;font-weight:600;color:#185FA5;">' + escHtml(u.ref) + '</div>'
        + '<div style="font-size:13px;font-weight:500;margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(u.desc) + '</div>'
        + '<div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;">'
        + '<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:#E6F1FB;color:#185FA5;">' + u.durationMins + ' min</span>'
        + '<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:#f0f0ee;color:#666;">' + escHtml(u.type) + '</span>'
        + '</div>'
        + '<div style="margin-top:10px;display:flex;flex-direction:column;gap:5px;">'
        + m.scheduled.map(s =>
            '<button class="btn-assign" style="font-size:11px;width:100%;text-align:left;padding:6px 10px;"'
            + ' data-jobid="' + u.id + '"'
            + ' data-jobref="' + escHtml(u.ref) + '"'
            + ' data-engid="' + s.engId + '"'
            + ' data-engname="' + escHtml(s.engName) + '"'
            + ' data-start="' + (s.endTime ? timeToMins(s.endTime) : s.startTime ? timeToMins(s.startTime) : DAY_START*60) + '"'
            + ' data-day="' + s.dayLabel.toLowerCase() + '">'
            + '&#128664; Assign to ' + escHtml(s.engName) + ' (' + s.dayLabel + ' after ' + (s.endTime ? fmtTime(s.endTime) : '?') + ')'
            + '</button>'
          ).join('')
        + '</div>'
        + '</div>'

        // Arrow
        + '<div style="text-align:center;padding-top:24px;font-size:18px;color:#185FA5;">&#8644;</div>'

        // Scheduled jobs
        + '<div>'
        + '<div style="font-size:10px;font-weight:600;color:#3B6D11;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Already scheduled here</div>'
        + m.scheduled.map(s => {
            const startLabel = s.startTime ? fmtTime(s.startTime) : 'TBC';
            const st = (s.status || '').toLowerCase();
            const statusColor = st === 'completedok' ? '#3B6D11' : st === 'completedwithissues' ? '#854F0B' : '#185FA5';
            const statusBg    = st === 'completedok' ? '#EAF3DE' : st === 'completedwithissues' ? '#FAEEDA' : '#E6F1FB';
            return '<div style="background:#f9f9f7;border:1px solid #e5e5e3;border-radius:7px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;">'
              + '<div style="flex:1;min-width:0;">'
              + '<div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(s.engName) + '</div>'
              + '<div style="font-size:11px;color:#888;">' + s.dayLabel + ' · ' + startLabel + '</div>'
              + '</div>'
              + '<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:' + statusBg + ';color:' + statusColor + ';white-space:nowrap;flex-shrink:0;">' + (s.status || 'scheduled') + '</span>'
              + '<button class="btn-assign" style="font-size:11px;flex-shrink:0;"'
              + ' data-jobid="' + u.id + '"'
              + ' data-jobref="' + escHtml(u.ref) + '"'
              + ' data-engid="' + s.engId + '"'
              + ' data-engname="' + escHtml(s.engName) + '"'
              + ' data-start="' + (s.endTime ? timeToMins(s.endTime) : s.startTime ? timeToMins(s.startTime) : DAY_START*60) + '"'
              + ' data-day="' + s.dayLabel.toLowerCase() + '">'
              + 'Assign</button>'
              + '</div>';
          }).join('')
        + '</div>'

        + '</div></div>';
    }).join('');
}

function renderFlags(jobId) {
  const flags = jobFlags[jobId];
  if (!flags || !flags.length) return '';
  return '<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;">'
    + flags.map(f => {
        const colour = f.colour || '#888';
        return '<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:' + colour + '20;color:' + colour + ';border:1px solid ' + colour + '40;font-weight:500;">'
          + '&#9873; ' + escHtml(f.name)
          + (f.comment ? ' — ' + escHtml(f.comment.substring(0, 60)) : '')
          + '</span>';
      }).join('')
    + '</div>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 3500);
}

loadAll();
setInterval(loadAll, 120000);
</script>
</body>
</html>
